<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Henry &amp; Lauri — Budget</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>🏠</text></svg>" />
  <style>
:root {
  --henry: #534AB7;
  --henry-light: #EEEDFE;
  --lauri: #0F6E56;
  --lauri-light: #E1F5EE;
  --bg: #F7F6F3;
  --surface: #FFFFFF;
  --border: rgba(0,0,0,0.09);
  --border-strong: rgba(0,0,0,0.16);
  --text: #1A1A18;
  --text-muted: #6B6B67;
  --text-faint: #9E9E9A;
  --danger: #C0392B;
  --danger-light: #FCEBEB;
  --success: #0F6E56;
  --radius: 10px;
  --radius-sm: 6px;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #16161A;
    --surface: #1E1E24;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.18);
    --text: #F0EFF8;
    --text-muted: #9B9AA8;
    --text-faint: #5E5D6A;
    --henry-light: #26215C;
    --lauri-light: #04342C;
    --danger-light: #3A1515;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

.app { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 4rem; }

/* ── Header ── */
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.5rem 0 1.25rem;
  border-bottom: 0.5px solid var(--border);
  margin-bottom: 1.5rem; gap: 1rem;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.logo {
  width: 40px; height: 40px; background: var(--henry); color: #fff;
  border-radius: var(--radius-sm); display: flex; align-items: center;
  justify-content: center; font-size: 13px; font-weight: 600;
  letter-spacing: 0.02em; flex-shrink: 0;
}
.app-header h1 { font-size: 18px; font-weight: 600; }
.header-sub { font-size: 13px; color: var(--text-muted); margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 8px; }

/* ── Controls ── */
select, input[type="number"], input[type="text"] {
  background: var(--surface);
  border: 0.5px solid var(--border-strong);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  padding: 6px 10px;
  outline: none;
  transition: border-color 0.15s;
}
select:focus, input:focus {
  border-color: var(--henry);
  box-shadow: 0 0 0 2px rgba(83,74,183,0.15);
}
.month-picker { padding: 6px 28px 6px 10px; }

.btn-primary {
  background: var(--henry); color: #fff; border: none;
  border-radius: var(--radius-sm); font-family: var(--font);
  font-size: 13px; font-weight: 500; padding: 7px 14px;
  cursor: pointer; transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.88; }

.btn-ghost {
  background: transparent; color: var(--text-muted);
  border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 13px; padding: 6px 13px;
  cursor: pointer; transition: background 0.15s;
}
.btn-ghost:hover { background: var(--border); }

.btn-icon {
  background: transparent; border: none; cursor: pointer;
  color: var(--text-faint); font-size: 14px; padding: 4px;
  border-radius: 4px; line-height: 1; transition: color 0.15s, background 0.15s;
}
.btn-icon:hover { color: var(--danger); background: var(--danger-light); }

/* ── Income bar ── */
.income-bar {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 1.25rem 1.5rem;
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; gap: 1.5rem; margin-bottom: 1rem;
}
.income-person label {
  display: block; font-size: 12px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 6px;
}
.income-person input { width: 160px; }
.income-person--right { text-align: right; }
.income-person--right input { float: right; }
.income-totals { text-align: center; }
.income-split {
  font-size: 12px; background: var(--henry-light); color: var(--henry);
  border-radius: 100px; padding: 3px 12px; display: inline-block;
  font-weight: 600; margin-bottom: 6px;
}
.income-total { display: flex; align-items: baseline; justify-content: center; gap: 6px; }
.t-label { font-size: 12px; color: var(--text-muted); }
.income-total strong { font-size: 16px; font-weight: 600; }

/* ── Rule bar ── */
.rule-bar {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 1rem 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
  gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;
}
.rule-bar-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.rule-label { font-size: 12px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text-muted); white-space: nowrap; }
.rule-pills { display: flex; gap: 6px; flex-wrap: wrap; }

.rule-pill {
  background: transparent; border: 0.5px solid var(--border-strong);
  border-radius: 100px; font-family: var(--font); font-size: 12px;
  font-weight: 500; padding: 5px 14px; cursor: pointer;
  color: var(--text-muted); transition: all 0.15s;
}
.rule-pill:hover { border-color: var(--henry); color: var(--henry); }
.rule-pill.active {
  background: var(--henry); color: #fff; border-color: var(--henry);
}
.rule-desc { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

/* ── Bucket cards ── */
.buckets {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px; margin-bottom: 1.5rem;
}
.bucket-card {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 1rem 1.25rem;
}
.bucket-top {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 10px; gap: 8px;
}
.bucket-name { font-size: 13px; font-weight: 600; display: block; margin-bottom: 4px; }
.bucket-pct-badge {
  font-size: 11px; font-weight: 700; padding: 2px 7px;
  border-radius: 100px; display: inline-block;
}
.bucket-amounts { text-align: right; }
.bucket-budget { display: block; font-size: 11px; color: var(--text-muted); }
.bucket-actual { display: block; font-size: 16px; font-weight: 600; }
.bucket-actual.over { color: var(--danger); }

.bucket-bar-track {
  background: var(--bg); border-radius: 4px; height: 6px; overflow: hidden; margin-bottom: 6px;
}
.bucket-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }

.bucket-foot { display: flex; justify-content: space-between; font-size: 11px; }
.bucket-used { color: var(--text-faint); }
.bucket-diff { font-weight: 600; }
.bucket-diff.over { color: var(--danger); }
.bucket-diff.under { color: var(--success); }

/* ── Section header ── */
.categories-section { margin-bottom: 2rem; }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 0.75rem;
}
.section-header h2 { font-size: 15px; font-weight: 600; }

/* ── Table header ── */
.cat-table-head {
  display: grid;
  grid-template-columns: 2fr 90px 120px 110px 160px 36px;
  gap: 8px; padding: 6px 1rem;
  font-size: 11px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.05em;
  border-bottom: 0.5px solid var(--border); margin-bottom: 4px;
}

/* ── Category group ── */
.cat-group { margin-bottom: 5px; }

.cat-parent-row {
  display: grid;
  grid-template-columns: 2fr 90px 120px 110px 160px 36px;
  gap: 8px; align-items: center;
  padding: 10px 1rem;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
}
.cat-parent-left { display: flex; align-items: center; gap: 8px; }
.cat-parent-name { font-size: 14px; font-weight: 600; }
.cat-parent-total { font-size: 14px; font-weight: 600; }
.cat-emoji { font-size: 18px; line-height: 1; }

.bucket-tag {
  font-size: 11px; font-weight: 600; padding: 2px 7px;
  border-radius: 100px; white-space: nowrap;
}

.btn-chevron {
  background: none; border: none; cursor: pointer; font-size: 10px;
  color: var(--text-muted); padding: 2px 4px; border-radius: 3px;
  transition: background 0.1s; line-height: 1; flex-shrink: 0;
}
.btn-chevron:hover { background: var(--border); }

/* ── Subs ── */
.subs-wrap { overflow: hidden; max-height: 2000px; transition: max-height 0.2s ease; }
.subs-wrap.collapsed { max-height: 0; }

.cat-sub-row {
  display: grid;
  grid-template-columns: 2fr 90px 120px 110px 160px 36px;
  gap: 8px; align-items: center;
  padding: 6px 1rem 6px 1.25rem;
  border-bottom: 0.5px solid var(--border);
  background: var(--bg); transition: background 0.1s;
}
.cat-sub-row:hover { background: var(--surface); }

.sub-name-cell { display: flex; align-items: center; gap: 6px; padding-left: 28px; }
.sub-indent { color: var(--text-faint); font-size: 12px; }
.sub-name-text { font-size: 13px; color: var(--text-muted); }
.sub-budget-cell { font-size: 13px; color: var(--text-faint); }
.sub-input { width: 100%; font-size: 13px; }

.add-sub-row {
  padding: 6px 1rem 6px calc(1.25rem + 40px);
  background: var(--bg);
  border-bottom: 0.5px solid var(--border);
  border-bottom-left-radius: var(--radius-sm);
  border-bottom-right-radius: var(--radius-sm);
}
.btn-add-sub {
  background: none; border: 0.5px dashed var(--border-strong);
  border-radius: var(--radius-sm); color: var(--text-muted);
  font-family: var(--font); font-size: 12px; padding: 4px 12px;
  cursor: pointer; transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.btn-add-sub:hover { color: var(--henry); border-color: var(--henry); background: var(--henry-light); }

/* ── Diff pill ── */
.diff-pill {
  font-size: 12px; font-weight: 600; padding: 3px 8px;
  border-radius: 100px; display: inline-block;
}
.diff-pill.positive { background: var(--lauri-light); color: var(--lauri); }
.diff-pill.negative { background: var(--danger-light); color: var(--danger); }
.diff-pill.neutral  { background: var(--bg); color: var(--text-faint); }

.split-display-cell { font-size: 12px; }
.henry-share { color: var(--henry); font-weight: 500; }
.lauri-share { color: var(--lauri); font-weight: 500; }

/* ── Split section ── */
.split-section { }
.split-section h2 { font-size: 15px; font-weight: 600; margin-bottom: 0.75rem; }
.split-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.split-person { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.split-person-header { padding: 10px 1.25rem; font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
.henry-color { background: var(--henry-light); color: var(--henry); }
.lauri-color { background: var(--lauri-light); color: var(--lauri); }
.split-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 1.25rem; border-bottom: 0.5px solid var(--border); font-size: 13px; }
.split-row-name { color: var(--text-muted); }
.split-amt.real { font-weight: 500; }
.split-total { display: flex; justify-content: space-between; padding: 10px 1.25rem; font-weight: 600; font-size: 14px; }

/* ── Modal ── */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
.modal {
  background: var(--surface); border-radius: var(--radius);
  padding: 1.5rem; width: 380px; display: flex; flex-direction: column; gap: 10px;
}
.modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.modal label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.modal input[type="text"] { width: 100%; }
.icon-picker { display: flex; flex-wrap: wrap; gap: 6px; }
.icon-opt {
  font-size: 20px; padding: 6px 8px; border-radius: var(--radius-sm);
  cursor: pointer; border: 1.5px solid transparent; transition: border-color 0.1s, background 0.1s; line-height: 1;
}
.icon-opt:hover { background: var(--bg); }
.icon-opt.selected { border-color: var(--henry); background: var(--henry-light); }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 4px; }

/* ── Responsive ── */
@media (max-width: 860px) {
  .income-bar { grid-template-columns: 1fr; }
  .income-person--right { text-align: left; }
  .income-person--right input { float: none; }
  .cat-table-head, .cat-parent-row, .cat-sub-row {
    grid-template-columns: 1fr 100px 80px;
  }
  .cat-table-head > *:nth-child(n+4),
  .cat-parent-row > *:nth-child(n+4),
  .cat-sub-row > *:nth-child(n+4) { display: none; }
  .split-grid { grid-template-columns: 1fr; }
  .rule-bar { flex-direction: column; align-items: flex-start; }
  .rule-desc { display: none; }
}

  /* ── Export/Import bar ── */
  .data-bar {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 8px; padding: 8px 0 0;
    border-top: 0.5px solid var(--border);
    margin-top: 2rem;
  }
  .data-bar-label { font-size: 12px; color: var(--text-faint); margin-right: 4px; }
  </style>
</head>
<body>
  <div class="app">

    <header class="app-header">
      <div class="header-left">
        <span class="logo">H&amp;L</span>
        <div>
          <h1>Household Budget</h1>
          <p class="header-sub" id="header-month">—</p>
        </div>
      </div>
      <div class="header-right">
        <select id="month-select" class="month-picker"></select>
        <button class="btn-primary" id="btn-new-month">+ New month</button>
      </div>
    </header>

    <div class="income-bar">
      <div class="income-person">
        <label>Henry</label>
        <input type="number" id="henry-income" placeholder="Net income" min="0" step="50" />
      </div>
      <div class="income-totals">
        <div class="income-split" id="split-display">50% / 50%</div>
        <div class="income-total">
          <span class="t-label">Total income</span>
          <strong id="total-income">€0</strong>
        </div>
      </div>
      <div class="income-person income-person--right">
        <label>Lauri</label>
        <input type="number" id="lauri-income" placeholder="Net income" min="0" step="50" />
      </div>
    </div>

    <div class="rule-bar">
      <div class="rule-bar-left">
        <span class="rule-label">Budget rule</span>
        <div class="rule-pills" id="rule-pills"></div>
      </div>
      <div class="rule-bar-right">
        <div class="rule-desc" id="rule-desc"></div>
      </div>
    </div>

    <div class="buckets" id="buckets"></div>

    <div class="categories-section">
      <div class="section-header">
        <h2>Expenses</h2>
        <button class="btn-ghost" id="btn-add-cat">+ Add category</button>
      </div>
      <div class="cat-table-head">
        <span>Category / Item</span>
        <span>Budget</span>
        <span>Actual (€)</span>
        <span>Difference</span>
        <span>Henry / Lauri</span>
        <span></span>
      </div>
      <div id="cat-rows"></div>
    </div>

    <div class="split-section">
      <h2>Who pays what</h2>
      <div class="split-grid">
        <div class="split-person">
          <div class="split-person-header henry-color">Henry</div>
          <div id="henry-split-rows"></div>
          <div class="split-total" id="henry-total-row"></div>
        </div>
        <div class="split-person">
          <div class="split-person-header lauri-color">Lauri</div>
          <div id="lauri-split-rows"></div>
          <div class="split-total" id="lauri-total-row"></div>
        </div>
      </div>
    </div>

    <div class="data-bar">
      <span class="data-bar-label">Data:</span>
      <button class="btn-ghost" id="btn-export">⬇ Export backup</button>
      <button class="btn-ghost" id="btn-import">⬆ Import backup</button>
      <input type="file" id="import-file" accept=".json" style="display:none" />
    </div>

  </div>

  <div class="modal-backdrop" id="modal-backdrop" style="display:none">
    <div class="modal">
      <h3 id="modal-title">New category</h3>
      <label>Name</label>
      <input type="text" id="new-cat-name" placeholder="e.g. Fuel" />
      <div id="modal-icon-row">
        <label>Icon</label>
        <div class="icon-picker" id="icon-picker"></div>
      </div>
      <label id="modal-bucket-label">Budget bucket</label>
      <select id="modal-bucket" style="width:100%"></select>
      <div class="modal-actions">
        <button class="btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-confirm">Add</button>
      </div>
    </div>
  </div>

  <script>
// ─── Budget rules ─────────────────────────────────────────────────────────────

const RULES = {
  '50-30-20': {
    label: '50/30/20',
    desc: '50% needs · 30% wants · 20% savings',
    buckets: [
      { id: 'needs',   label: 'Needs',   pct: 50, color: '#534AB7' },
      { id: 'wants',   label: 'Wants',   pct: 30, color: '#0F6E56' },
      { id: 'savings', label: 'Savings', pct: 20, color: '#B87333' },
    ]
  },
  '70-20-10': {
    label: '70/20/10',
    desc: '70% living · 20% savings · 10% giving/debt',
    buckets: [
      { id: 'living',  label: 'Living',  pct: 70, color: '#534AB7' },
      { id: 'savings', label: 'Savings', pct: 20, color: '#0F6E56' },
      { id: 'giving',  label: 'Giving / Debt', pct: 10, color: '#B87333' },
    ]
  },
  '60-20-20': {
    label: '60/20/20',
    desc: '60% committed · 20% wants · 20% savings',
    buckets: [
      { id: 'committed', label: 'Committed', pct: 60, color: '#534AB7' },
      { id: 'wants',     label: 'Wants',     pct: 20, color: '#0F6E56' },
      { id: 'savings',   label: 'Savings',   pct: 20, color: '#B87333' },
    ]
  },
  'zero': {
    label: 'Zero-based',
    desc: 'Every euro assigned — income minus all categories = 0',
    buckets: [
      { id: 'all', label: 'All expenses', pct: 100, color: '#534AB7' },
    ]
  },
  'envelope': {
    label: 'Envelope',
    desc: 'Custom buckets — you decide the percentages',
    buckets: [
      { id: 'housing',   label: 'Housing',    pct: 30, color: '#534AB7' },
      { id: 'transport', label: 'Transport',  pct: 15, color: '#0F6E56' },
      { id: 'food',      label: 'Food',       pct: 12, color: '#B87333' },
      { id: 'savings',   label: 'Savings',    pct: 20, color: '#6B3FA0' },
      { id: 'other',     label: 'Other',      pct: 23, color: '#888' },
    ]
  },
};

// ─── Default categories ───────────────────────────────────────────────────────

function defaultCategories(ruleId) {
  const buckets = RULES[ruleId].buckets;
  const b0 = buckets[0].id;
  const bSav = buckets.find(b => b.id === 'savings')?.id || b0;
  const bWant = buckets.find(b => b.id === 'wants' || b.id === 'living')?.id || b0;

  const needsBucket = ruleId === 'envelope' ? 'housing' :
                      ruleId === '70-20-10' ? 'living' :
                      ruleId === 'zero'     ? 'all' : 'needs';

  return [
    {
      id: 'housing', emoji: '🏠', name: 'Housing', collapsed: true,
      bucket: ruleId === 'envelope' ? 'housing' : needsBucket,
      subs: [{ id: uid(), name: 'Rent / mortgage', real: 0 }]
    },
    {
      id: 'groceries', emoji: '🛒', name: 'Groceries & food', collapsed: true,
      bucket: ruleId === 'envelope' ? 'food' : needsBucket,
      subs: [
        { id: uid(), name: 'Supermarket', real: 0 },
        { id: uid(), name: 'Takeaway & dining', real: 0 },
      ]
    },
    {
      id: 'transport', emoji: '🚗', name: 'Transport', collapsed: true,
      bucket: ruleId === 'envelope' ? 'transport' : needsBucket,
      subs: [
        { id: uid(), name: 'Car payment', real: 0 },
        { id: uid(), name: 'Fuel', real: 0 },
        { id: uid(), name: 'Public transport', real: 0 },
      ]
    },
    {
      id: 'utilities', emoji: '⚡', name: 'Utilities & bills', collapsed: true,
      bucket: ruleId === 'envelope' ? 'other' : needsBucket,
      subs: [
        { id: uid(), name: 'Electricity', real: 0 },
        { id: uid(), name: 'Internet', real: 0 },
        { id: uid(), name: 'Phone', real: 0 },
      ]
    },
    {
      id: 'savings', emoji: '💰', name: 'Savings', collapsed: true,
      bucket: ruleId === 'envelope' ? 'savings' : bSav,
      subs: [
        { id: uid(), name: 'Emergency fund', real: 0 },
        { id: uid(), name: 'Investments', real: 0 },
      ]
    },
    {
      id: 'kids', emoji: '👶', name: 'Kids & family', collapsed: true,
      bucket: ruleId === 'envelope' ? 'other' : needsBucket,
      subs: [
        { id: uid(), name: 'Childcare', real: 0 },
        { id: uid(), name: 'Activities', real: 0 },
      ]
    },
  ];
}

const ICONS = ['🏠','🛒','🚗','⚡','💰','👶','🍽️','🎬','🏥','📱','🐾','🧴','🎓','✈️','🏋️','🎁','🧾','🔧','🌿','💻','🎯','🐶','🎵','🛁','🍺','👗','🏖️','🎮'];

// ─── State ────────────────────────────────────────────────────────────────────

let state = {
  months: {},
  activeMonth: null,
  activeRule: '50-30-20',
};

// ─── Persistence ──────────────────────────────────────────────────────────────
// Uses Electron file storage when running as desktop app, localStorage as fallback.

const isElectron = false;

function migrateState(s) {
  Object.values(s.months || {}).forEach(month => {
    (month.categories || []).forEach(cat => {
      if (cat.collapsed === undefined) cat.collapsed = true;
    });
  });
  return s;
}

async function saveState() {
  if (isElectron) {
    await window.electronAPI.save(state);
  } else {
    localStorage.setItem('hl-budget', JSON.stringify(state));
  }
}

async function loadState() {
  if (isElectron) {
    const data = await window.electronAPI.load();
    if (data) state = migrateState(data);
  } else {
    const raw = localStorage.getItem('hl-budget');
    if (raw) { try { state = migrateState(JSON.parse(raw)); } catch {} }
  }
}

function getMonthData(key) {
  if (!state.months[key]) {
    state.months[key] = {
      henry: 2200,
      lauri: 2200,
      categories: defaultCategories(state.activeRule || '50-30-20'),
    };
    saveState();
  }
  return state.months[key];
}

// ─── Helpers ──────────────────────────────────────────────────────────────────

function uid() { return Math.random().toString(36).slice(2, 9); }
function fmt(n) { return '€' + Math.round(n).toLocaleString('de-DE'); }
function pct(v, t) { return t ? Math.round(v / t * 100) : 0; }

function monthLabel(key) {
  const [y, m] = key.split('-');
  return new Date(+y, +m - 1, 1).toLocaleString('en-GB', { month: 'long', year: 'numeric' });
}

function currentMonthKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function catTotal(cat) {
  return (cat.subs || []).reduce((s, sub) => s + (+sub.real || 0), 0);
}

// ─── Rule UI ──────────────────────────────────────────────────────────────────

function renderRuleBar() {
  const pills = document.getElementById('rule-pills');
  pills.innerHTML = '';
  Object.entries(RULES).forEach(([id, rule]) => {
    const btn = document.createElement('button');
    btn.className = 'rule-pill' + (id === state.activeRule ? ' active' : '');
    btn.textContent = rule.label;
    btn.addEventListener('click', () => {
      state.activeRule = id;
      saveState();
      renderRuleBar();
      recalc();
    });
    pills.appendChild(btn);
  });
  document.getElementById('rule-desc').textContent = RULES[state.activeRule].desc;
}

// ─── Bucket summary ───────────────────────────────────────────────────────────

function renderBuckets(totalIncome, data) {
  const rule = RULES[state.activeRule];
  const container = document.getElementById('buckets');
  container.innerHTML = '';

  // Tally actual spend per bucket
  const actualByBucket = {};
  rule.buckets.forEach(b => actualByBucket[b.id] = 0);
  data.categories.forEach(cat => {
    const bId = cat.bucket || rule.buckets[0].id;
    if (actualByBucket[bId] !== undefined) {
      actualByBucket[bId] += catTotal(cat);
    }
  });

  rule.buckets.forEach(b => {
    const budget = Math.round(totalIncome * b.pct / 100);
    const actual = Math.round(actualByBucket[b.id] || 0);
    const diff   = actual - budget;
    const usedPct = budget > 0 ? Math.min(100, Math.round(actual / budget * 100)) : 0;
    const over = actual > budget;

    const card = document.createElement('div');
    card.className = 'bucket-card';
    card.innerHTML = `
      <div class="bucket-top">
        <div>
          <span class="bucket-name">${b.label}</span>
          <span class="bucket-pct-badge" style="background:${b.color}22;color:${b.color}">${b.pct}%</span>
        </div>
        <div class="bucket-amounts">
          <span class="bucket-budget">${fmt(budget)}</span>
          <span class="bucket-actual ${over ? 'over' : ''}">${fmt(actual)}</span>
        </div>
      </div>
      <div class="bucket-bar-track">
        <div class="bucket-bar-fill" style="width:${usedPct}%;background:${over ? '#C0392B' : b.color}"></div>
      </div>
      <div class="bucket-foot">
        <span class="bucket-used">${usedPct}% used</span>
        <span class="bucket-diff ${over ? 'over' : 'under'}">${over ? '+' : ''}${fmt(diff)}</span>
      </div>
    `;
    container.appendChild(card);
  });
}

// ─── Month picker ─────────────────────────────────────────────────────────────

function refreshMonthPicker() {
  const sel = document.getElementById('month-select');
  const keys = Object.keys(state.months).sort().reverse();
  sel.innerHTML = '';
  keys.forEach(k => {
    const opt = document.createElement('option');
    opt.value = k; opt.textContent = monthLabel(k);
    if (k === state.activeMonth) opt.selected = true;
    sel.appendChild(opt);
  });
}

// ─── Render / Recalc ──────────────────────────────────────────────────────────

function render() {
  const data = getMonthData(state.activeMonth);
  document.getElementById('header-month').textContent = monthLabel(state.activeMonth);
  const hi = document.getElementById('henry-income');
  const li = document.getElementById('lauri-income');
  if (document.activeElement !== hi) hi.value = data.henry || '';
  if (document.activeElement !== li) li.value = data.lauri || '';
  recalc();
}

function recalc() {
  const data = getMonthData(state.activeMonth);
  const henry  = +data.henry || 0;
  const lauri  = +data.lauri || 0;
  const total  = henry + lauri;
  const rH = total > 0 ? henry / total : 0.5;
  const rL = total > 0 ? lauri / total : 0.5;

  document.getElementById('split-display').textContent =
    `${Math.round(rH * 100)}% / ${Math.round(rL * 100)}%`;
  document.getElementById('total-income').textContent = fmt(total);

  renderBuckets(total, data);
  renderCatRows(data, total, rH, rL);
  renderSplitSection(data, rH, rL);
  saveState();
}

// ─── Category rows ────────────────────────────────────────────────────────────

function renderCatRows(data, totalIncome, rH, rL) {
  const rule = RULES[state.activeRule];
  const container = document.getElementById('cat-rows');
  container.innerHTML = '';

  data.categories.forEach((cat, cIdx) => {
    const actual  = catTotal(cat);
    const bucket  = rule.buckets.find(b => b.id === cat.bucket) || rule.buckets[0];
    const bucketBudgetTotal = Math.round(totalIncome * bucket.pct / 100);
    const catBudget = data.categories.filter(c => (c.bucket || rule.buckets[0].id) === bucket.id).length > 0
      ? null : bucketBudgetTotal; // no per-cat budget in rule-based mode; show bucket context

    const diff    = actual; // compare to 0 since budget is the bucket
    const chevron = cat.collapsed ? '▶' : '▼';

    const parent = document.createElement('div');
    parent.className = 'cat-group';

    parent.innerHTML = `
      <div class="cat-parent-row">
        <div class="cat-parent-left">
          <button class="btn-chevron" data-toggle="${cIdx}">${chevron}</button>
          <span class="cat-emoji">${cat.emoji}</span>
          <span class="cat-parent-name">${cat.name}</span>
          <span class="bucket-tag" style="background:${bucket.color}22;color:${bucket.color}">${bucket.label}</span>
        </div>
        <span class="cat-parent-total">—</span>
        <span class="cat-parent-total">${fmt(actual)}</span>
        <span class="diff-pill neutral">—</span>
        <span class="split-display-cell">
          <span class="henry-share">H: ${fmt(actual * rH)}</span>
          · <span class="lauri-share">L: ${fmt(actual * rL)}</span>
        </span>
        <button class="btn-icon btn-del-cat" data-del-cat="${cIdx}" title="Delete">✕</button>
      </div>
    `;

    const subsWrap = document.createElement('div');
    subsWrap.className = 'subs-wrap' + (cat.collapsed ? ' collapsed' : '');

    (cat.subs || []).forEach((sub, sIdx) => {
      const subRow = document.createElement('div');
      subRow.className = 'cat-sub-row';
      subRow.innerHTML = `
        <div class="sub-name-cell">
          <span class="sub-indent">└</span>
          <span class="sub-name-text">${sub.name}</span>
        </div>
        <span class="sub-budget-cell">—</span>
        <input type="number" class="sub-input" data-cidx="${cIdx}" data-sidx="${sIdx}"
          value="${sub.real || ''}" placeholder="0" min="0" step="10" />
        <span class="diff-pill neutral">—</span>
        <span class="split-display-cell">
          <span class="henry-share">H: ${fmt((+sub.real || 0) * rH)}</span>
          · <span class="lauri-share">L: ${fmt((+sub.real || 0) * rL)}</span>
        </span>
        <button class="btn-icon btn-del-sub" data-cidx="${cIdx}" data-sidx="${sIdx}" title="Remove">✕</button>
      `;
      subsWrap.appendChild(subRow);
    });

    const addSubRow = document.createElement('div');
    addSubRow.className = 'add-sub-row';
    addSubRow.innerHTML = `<button class="btn-add-sub" data-cidx="${cIdx}">+ Add item</button>`;
    subsWrap.appendChild(addSubRow);
    parent.appendChild(subsWrap);
    container.appendChild(parent);
  });

  // Events
  container.querySelectorAll('[data-toggle]').forEach(btn => {
    btn.addEventListener('click', e => {
      const cIdx = +e.currentTarget.dataset.toggle;
      data.categories[cIdx].collapsed = !data.categories[cIdx].collapsed;
      recalc();
    });
  });

  container.querySelectorAll('.sub-input').forEach(input => {
    input.addEventListener('change', e => {
      const { cidx, sidx } = e.target.dataset;
      data.categories[+cidx].subs[+sidx].real = +e.target.value || 0;
      recalc();
    });
  });

  container.querySelectorAll('.btn-del-sub').forEach(btn => {
    btn.addEventListener('click', e => {
      const { cidx, sidx } = e.currentTarget.dataset;
      data.categories[+cidx].subs.splice(+sidx, 1);
      recalc();
    });
  });

  container.querySelectorAll('.btn-del-cat').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = +e.currentTarget.dataset.delCat;
      if (confirm(`Delete "${data.categories[idx].name}" and all its items?`)) {
        data.categories.splice(idx, 1);
        recalc();
      }
    });
  });

  container.querySelectorAll('.btn-add-sub').forEach(btn => {
    btn.addEventListener('click', e => openSubModal(+e.currentTarget.dataset.cidx));
  });
}

// ─── Split section ────────────────────────────────────────────────────────────

function renderSplitSection(data, rH, rL) {
  const hRows = document.getElementById('henry-split-rows');
  const lRows = document.getElementById('lauri-split-rows');
  hRows.innerHTML = '';
  lRows.innerHTML = '';

  let hTotal = 0, lTotal = 0;
  data.categories.forEach(cat => {
    const actual = catTotal(cat);
    const hA = actual * rH, lA = actual * rL;
    hTotal += hA; lTotal += lA;
    hRows.innerHTML += `<div class="split-row"><span class="split-row-name">${cat.emoji} ${cat.name}</span><span class="split-amt real">${fmt(hA)}</span></div>`;
    lRows.innerHTML += `<div class="split-row"><span class="split-row-name">${cat.emoji} ${cat.name}</span><span class="split-amt real">${fmt(lA)}</span></div>`;
  });

  document.getElementById('henry-total-row').innerHTML = `<span>Total</span><span>${fmt(hTotal)}</span>`;
  document.getElementById('lauri-total-row').innerHTML = `<span>Total</span><span>${fmt(lTotal)}</span>`;
}

// ─── Modal ────────────────────────────────────────────────────────────────────

let selectedIcon = '🧾';
let modalMode    = 'category';
let modalCatIdx  = null;

function openCatModal() {
  modalMode = 'category';
  selectedIcon = '🧾';
  document.getElementById('new-cat-name').value = '';
  document.getElementById('modal-icon-row').style.display = '';
  document.getElementById('modal-bucket-label').style.display = '';
  document.getElementById('modal-bucket').style.display = '';
  document.getElementById('modal-title').textContent = 'New category';
  buildIconPicker();
  buildBucketSelect(null);
  document.getElementById('modal-backdrop').style.display = 'flex';
  setTimeout(() => document.getElementById('new-cat-name').focus(), 50);
}

function openSubModal(cIdx) {
  modalMode = 'sub';
  modalCatIdx = cIdx;
  document.getElementById('new-cat-name').value = '';
  document.getElementById('modal-icon-row').style.display = 'none';
  document.getElementById('modal-bucket-label').style.display = 'none';
  document.getElementById('modal-bucket').style.display = 'none';
  const data = getMonthData(state.activeMonth);
  document.getElementById('modal-title').textContent = `Add item to "${data.categories[cIdx].name}"`;
  document.getElementById('modal-backdrop').style.display = 'flex';
  setTimeout(() => document.getElementById('new-cat-name').focus(), 50);
}

function closeModal() { document.getElementById('modal-backdrop').style.display = 'none'; }

function buildIconPicker() {
  const picker = document.getElementById('icon-picker');
  picker.innerHTML = '';
  ICONS.forEach(icon => {
    const btn = document.createElement('button');
    btn.className = 'icon-opt' + (icon === selectedIcon ? ' selected' : '');
    btn.textContent = icon; btn.type = 'button';
    btn.addEventListener('click', () => {
      selectedIcon = icon;
      picker.querySelectorAll('.icon-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
    picker.appendChild(btn);
  });
}

function buildBucketSelect(currentBucket) {
  const sel = document.getElementById('modal-bucket');
  sel.innerHTML = '';
  RULES[state.activeRule].buckets.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b.id; opt.textContent = `${b.label} (${b.pct}%)`;
    if (b.id === currentBucket) opt.selected = true;
    sel.appendChild(opt);
  });
}

function confirmModal() {
  const name = document.getElementById('new-cat-name').value.trim();
  if (!name) { document.getElementById('new-cat-name').focus(); return; }
  const data = getMonthData(state.activeMonth);

  if (modalMode === 'category') {
    const bucketEl = document.getElementById('modal-bucket');
    const bucket = (bucketEl && bucketEl.options.length > 0)
      ? bucketEl.value
      : RULES[state.activeRule].buckets[0].id;
    data.categories.push({ id: uid(), emoji: selectedIcon, name, collapsed: true, bucket, subs: [] });
  } else {
    data.categories[modalCatIdx].subs.push({ id: uid(), name, real: 0 });
    data.categories[modalCatIdx].collapsed = false;
  }
  closeModal();
  recalc();
}

// ─── Income ───────────────────────────────────────────────────────────────────

function bindIncomeInputs() {
  document.getElementById('henry-income').addEventListener('change', () => {
    const data = getMonthData(state.activeMonth);
    data.henry = +document.getElementById('henry-income').value || 0;
    recalc();
  });
  document.getElementById('lauri-income').addEventListener('change', () => {
    const data = getMonthData(state.activeMonth);
    data.lauri = +document.getElementById('lauri-income').value || 0;
    recalc();
  });
}

// ─── Init ─────────────────────────────────────────────────────────────────────

async function init() {
  await loadState();
  if (!state.activeRule) state.activeRule = '50-30-20';

  const cur = currentMonthKey();
  if (!state.activeMonth || !state.months[state.activeMonth]) {
    state.activeMonth = cur;
    getMonthData(cur);
  }

  renderRuleBar();
  refreshMonthPicker();
  bindIncomeInputs();

  document.getElementById('month-select').addEventListener('change', e => {
    state.activeMonth = e.target.value;
    render();
  });

  document.getElementById('btn-new-month').addEventListener('click', () => {
    const keys = Object.keys(state.months).sort();
    const last = keys[keys.length - 1] || currentMonthKey();
    const [y, m] = last.split('-').map(Number);
    const next = m === 12 ? `${y + 1}-01` : `${y}-${String(m + 1).padStart(2, '0')}`;
    getMonthData(next);
    state.activeMonth = next;
    saveState();
    refreshMonthPicker();
    render();
  });

  document.getElementById('btn-add-cat').addEventListener('click', openCatModal);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-confirm').addEventListener('click', confirmModal);
  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.getElementById('new-cat-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmModal();
    if (e.key === 'Escape') closeModal();
  });

  render();
}

document.addEventListener('DOMContentLoaded', init);


  // ── Export / Import ──────────────────────────────────────────────────────────
  document.getElementById('btn-export').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const date = new Date().toISOString().slice(0, 10);
    a.href = url; a.download = `hl-budget-backup-${date}.json`;
    a.click(); URL.revokeObjectURL(url);
  });

  document.getElementById('btn-import').addEventListener('click', () => {
    document.getElementById('import-file').click();
  });

  document.getElementById('import-file').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (!imported.months) throw new Error('Invalid backup file');
        if (!confirm('This will replace all your current data. Continue?')) return;
        state = imported;
        if (!state.activeRule) state.activeRule = '50-30-20';
        saveState();
        refreshMonthPicker();
        renderRuleBar();
        render();
        alert('Data imported successfully.');
      } catch (err) {
        alert('Could not read file: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });
  </script>
